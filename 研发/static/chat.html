<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>角色对话</title>
<style>
:root{
  --bg:#f8f3ed;
  --text:#201914;
  --muted:#706255;
  --line:rgba(112,88,65,.16);
  --glass:rgba(255,255,255,.72);
  --glass-strong:rgba(255,255,255,.9);
  --accent:#8f5835;
  --accent-2:#c88a56;
  --accent-3:#6f8e7b;
  --good:#2f7b5b;
  --warn:#be4f45;
  --user:#efe0cf;
  --assistant:#f6efe5;
  --shadow:0 30px 90px rgba(54,35,20,.14);
  --panel-shadow:0 18px 46px rgba(54,35,20,.1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  position:relative;
  overflow:hidden;
  color:var(--text);
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:
    radial-gradient(circle at 12% 18%, rgba(224,171,131,.18), transparent 26%),
    radial-gradient(circle at 82% 14%, rgba(128,159,143,.14), transparent 24%),
    radial-gradient(circle at 76% 78%, rgba(243,214,174,.18), transparent 24%),
    linear-gradient(135deg,#f8f3ed 0%,#f1e7db 42%,#f8f4ef 100%);
}
body::before,
body::after{
  content:"";
  position:fixed;
  pointer-events:none;
  filter:blur(22px);
  opacity:.9;
}
body::before{
  width:34vw;
  height:34vw;
  min-width:300px;
  min-height:300px;
  left:-8vw;
  top:-10vh;
  border-radius:50%;
  background:radial-gradient(circle, rgba(215,164,124,.32) 0%, rgba(215,164,124,0) 68%);
  animation:haloA 18s ease-in-out infinite alternate;
}
body::after{
  width:40vw;
  height:40vw;
  min-width:340px;
  min-height:340px;
  right:-12vw;
  bottom:-14vh;
  border-radius:52% 48% 60% 40% / 44% 41% 59% 56%;
  background:
    radial-gradient(circle at 42% 42%, rgba(121,158,138,.26) 0%, rgba(121,158,138,0) 54%),
    radial-gradient(circle at 60% 60%, rgba(236,205,173,.26) 0%, rgba(236,205,173,0) 58%);
  animation:haloB 20s ease-in-out infinite alternate;
}
.ambient{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}
.ambient span{
  position:absolute;
  border-radius:50%;
  filter:blur(12px);
  opacity:.6;
  animation:drift 20s ease-in-out infinite;
}
.ambient span:nth-child(1){
  width:220px;
  height:220px;
  top:8%;
  left:24%;
  background:radial-gradient(circle, rgba(255,255,255,.78), rgba(255,255,255,0));
}
.ambient span:nth-child(2){
  width:260px;
  height:260px;
  right:20%;
  top:32%;
  background:radial-gradient(circle, rgba(205,225,216,.58), rgba(205,225,216,0));
  animation-delay:-7s;
}
.ambient span:nth-child(3){
  width:240px;
  height:240px;
  left:48%;
  bottom:6%;
  background:radial-gradient(circle, rgba(238,212,187,.66), rgba(238,212,187,0));
  animation-delay:-12s;
}
.layout{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:320px minmax(0,1fr);
  gap:18px;
  height:100vh;
  padding:18px;
}
.sidebar,
.topbar,
.profile,
.stats,
.composer{
  background:linear-gradient(180deg, rgba(255,255,255,.84), rgba(255,249,252,.74));
  border:1px solid rgba(255,255,255,.7);
  box-shadow:var(--panel-shadow);
  backdrop-filter:blur(18px) saturate(120%);
}
.sidebar{
  display:flex;
  flex-direction:column;
  gap:18px;
  min-height:0;
  padding:18px;
  border-radius:30px;
}
.brand{
  position:relative;
  padding:18px 16px 20px;
  border-radius:24px;
  background:linear-gradient(145deg, rgba(86,54,34,.96) 0%, rgba(136,91,59,.92) 46%, rgba(86,111,99,.9) 100%);
  color:#fff9f7;
  overflow:hidden;
  box-shadow:0 24px 40px rgba(54,35,20,.18);
}
.brand::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 18% 24%, rgba(255,255,255,.2), transparent 20%),
    radial-gradient(circle at 82% 14%, rgba(255,235,213,.16), transparent 20%);
  pointer-events:none;
}
.brand h1{
  position:relative;
  margin:0;
  font-size:26px;
  letter-spacing:-.05em;
}
.brand p{
  position:relative;
  margin:10px 0 0;
  color:rgba(255,247,240,.84);
  line-height:1.75;
  font-size:13px;
}
.user-card{
  padding:18px;
  border-radius:24px;
  background:var(--glass);
  border:1px solid var(--line);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.58);
}
.user-card strong{display:block;font-size:15px}
.user-card span{
  display:block;
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
  word-break:break-all;
  line-height:1.7;
}
.actions{display:grid;gap:10px}
.button{
  border:0;
  border-radius:18px;
  padding:13px 16px;
  font-size:14px;
  font-weight:700;
  cursor:pointer;
  transition:transform .18s ease, box-shadow .18s ease, opacity .18s ease;
}
.button:hover{transform:translateY(-1px)}
.button:disabled{opacity:.62;cursor:not-allowed;transform:none}
.button.primary{
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 18px 34px rgba(143,88,53,.22);
}
.button.ghost{
  color:var(--text);
  background:var(--glass-strong);
  border:1px solid var(--line);
}
.button.secondary{
  color:#fff;
  background:linear-gradient(135deg,var(--accent-3),#89a898);
  box-shadow:0 18px 34px rgba(111,142,123,.2);
}
.button.warn{
  color:var(--warn);
  background:rgba(255,240,244,.92);
  border:1px solid rgba(214,48,79,.18);
}
.conversation-list{
  flex:1;
  min-height:0;
  overflow:auto;
  padding-right:4px;
  scrollbar-gutter:stable both-edges;
}
.conversation-list::-webkit-scrollbar,
.messages::-webkit-scrollbar{width:8px}
.conversation-list::-webkit-scrollbar-thumb,
.messages::-webkit-scrollbar-thumb{
  background:rgba(71,50,31,.16);
  border-radius:999px;
}
.conversation-card{
  position:relative;
  margin-bottom:10px;
}
.conversation-card:last-child{
  margin-bottom:0;
}
.conversation-item{
  width:100%;
  text-align:left;
  border:1px solid rgba(255,255,255,.36);
  background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.36));
  border-radius:22px;
  padding:16px 58px 16px 16px;
  cursor:pointer;
  transition:.22s ease;
}
.conversation-item:hover{
  background:linear-gradient(180deg, rgba(255,255,255,.88), rgba(247,240,231,.84));
  transform:translateY(-1px);
}
.conversation-item.active{
  background:linear-gradient(135deg, rgba(143,88,53,.12), rgba(255,255,255,.95) 38%, rgba(111,142,123,.14) 100%);
  border-color:rgba(143,88,53,.18);
  box-shadow:0 18px 34px rgba(54,35,20,.1);
}
.conversation-item strong{
  display:block;
  font-size:14px;
  line-height:1.55;
}
.conversation-item span{
  display:block;
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}
.conversation-delete{
  position:absolute;
  top:12px;
  right:12px;
  width:34px;
  height:34px;
  border:1px solid rgba(214,48,79,.18);
  border-radius:12px;
  background:rgba(255,248,250,.92);
  color:var(--warn);
  font-size:16px;
  font-weight:800;
  line-height:1;
  cursor:pointer;
  opacity:0;
  transform:translateY(4px);
  transition:.22s ease;
}
.conversation-card:hover .conversation-delete,
.conversation-item.active + .conversation-delete{
  opacity:1;
  transform:translateY(0);
}
.conversation-delete:hover{
  background:#fff0f3;
  border-color:rgba(214,48,79,.34);
}
.conversation-delete:disabled{
  opacity:.55;
  cursor:not-allowed;
  transform:none;
}
.main{
  position:relative;
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr) auto;
  gap:18px;
  min-width:0;
  min-height:0;
}
.topbar{
  position:relative;
  z-index:50;
  overflow:visible;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:18px;
  padding:20px 22px;
  border-radius:30px;
}
.headline{
  min-height:72px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}
.headline h2{
  margin:0;
  font-size:30px;
  letter-spacing:-.05em;
}
.headline p{
  margin:8px 0 0;
  color:var(--muted);
  font-size:14px;
}
.filters{
  position:relative;
  z-index:2;
  display:flex;
  gap:12px;
  align-items:center;
  flex-wrap:wrap;
}
.topbar-actions{
  display:flex;
  gap:12px;
  align-items:flex-end;
}
.field{display:flex;flex-direction:column;gap:7px}
.field label{
  font-size:12px;
  color:var(--muted);
  padding-left:4px;
}
.select-shell{
  position:relative;
  min-width:190px;
  z-index:1;
}
.native-select{
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
}
.select-trigger{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:13px 16px;
  border-radius:18px;
  border:1px solid var(--line);
  color:var(--text);
  background:
    linear-gradient(180deg, rgba(255,255,255,.96), rgba(247,240,231,.9));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.54);
  font-size:14px;
  text-align:left;
  cursor:pointer;
  outline:none;
  transition:.22s ease;
}
.select-trigger:hover{border-color:rgba(143,88,53,.24)}
.select-shell.open .select-trigger,
.select-trigger:focus,
.composer textarea:focus{
  border-color:rgba(143,88,53,.34);
  box-shadow:0 0 0 4px rgba(143,88,53,.08), inset 0 1px 0 rgba(255,255,255,.52);
}
.select-shell.open{
  z-index:120;
}
.select-value{
  min-width:0;
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.select-trigger::after{
  content:"";
  flex:0 0 auto;
  width:10px;
  height:10px;
  border-right:2px solid #9a856f;
  border-bottom:2px solid #9a856f;
  transform:translateY(-2px) rotate(45deg);
  pointer-events:none;
  transition:transform .18s ease;
}
.select-shell.open .select-trigger::after{
  transform:translateY(2px) rotate(-135deg);
}
.select-trigger:disabled{
  opacity:.62;
  cursor:not-allowed;
}
.select-menu{
  position:absolute;
  top:calc(100% + 10px);
  left:0;
  right:0;
  z-index:140;
  padding:8px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.62);
  background:linear-gradient(180deg, rgba(255,252,248,.98), rgba(255,243,247,.95));
  box-shadow:0 24px 40px rgba(54,35,20,.14);
  backdrop-filter:blur(18px) saturate(120%);
  opacity:0;
  transform:translateY(8px) scale(.98);
  pointer-events:none;
  transition:opacity .18s ease, transform .18s ease;
  max-height:260px;
  overflow:auto;
}
.select-menu::-webkit-scrollbar{width:8px}
.select-menu::-webkit-scrollbar-thumb{
  background:rgba(71,50,31,.16);
  border-radius:999px;
}
.select-search{
  position:sticky;
  top:0;
  z-index:2;
  margin-bottom:8px;
  padding:4px 2px 10px;
  background:linear-gradient(180deg, rgba(255,251,247,.98), rgba(246,238,229,.92));
}
.select-search-input{
  width:100%;
  padding:11px 13px;
  border-radius:14px;
  border:1px solid rgba(141,84,48,.14);
  background:rgba(255,255,255,.82);
  color:var(--text);
  font-size:13px;
  outline:none;
  transition:.18s ease;
}
.select-search-input:focus{
  border-color:rgba(141,84,48,.34);
  box-shadow:0 0 0 4px rgba(141,84,48,.06);
}
.select-options{
  display:flex;
  flex-direction:column;
  gap:2px;
}
.select-shell.open .select-menu{
  opacity:1;
  transform:translateY(0) scale(1);
  pointer-events:auto;
}
.select-option{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:12px 14px;
  border:0;
  border-radius:16px;
  background:transparent;
  color:var(--text);
  font-size:14px;
  text-align:left;
  cursor:pointer;
  transition:.18s ease;
}
.select-option:hover{
  background:rgba(255,255,255,.72);
}
.select-option.placeholder{
  color:var(--muted);
}
.select-option.active{
  background:linear-gradient(135deg, rgba(143,88,53,.1), rgba(111,142,123,.12));
  box-shadow:inset 0 0 0 1px rgba(143,88,53,.08);
}
.select-option.active::after{
  content:"";
  width:8px;
  height:8px;
  border-radius:50%;
  background:linear-gradient(135deg, var(--accent), var(--accent-3));
  box-shadow:0 0 0 6px rgba(143,88,53,.08);
}
.select-empty{
  padding:12px 14px;
  border-radius:16px;
  color:var(--muted);
  font-size:13px;
  text-align:center;
}
.cards{
  display:grid;
  grid-template-columns:minmax(0,1fr) 280px;
  gap:18px;
}
.profile,.stats{
  padding:18px 20px;
  border-radius:28px;
}
.profile strong,.stats strong{
  display:block;
  font-size:14px;
}
.profile p{
  margin:10px 0 0;
  min-height:calc(1.8em * 4);
  color:var(--muted);
  line-height:1.8;
  font-size:14px;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.stats-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
  margin-top:12px;
}
.stat{
  padding:12px 14px;
  border-radius:20px;
  background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(247,240,231,.88));
  border:1px solid var(--line);
}
.stat span{
  display:block;
  font-size:12px;
  color:var(--muted);
}
.stat strong{
  margin-top:6px;
  font-size:20px;
}
.messages{
  min-height:0;
  overflow:auto;
  padding:2px 8px 2px 2px;
  scrollbar-gutter:stable both-edges;
}
.empty{
  min-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:34px;
  border-radius:30px;
  border:1px dashed rgba(141,84,48,.22);
  background:linear-gradient(180deg, rgba(255,255,255,.44), rgba(255,255,255,.28));
  color:var(--muted);
  text-align:center;
}
.message-row{display:flex;gap:14px;margin-bottom:18px}
.message-row.user{justify-content:flex-end}
.avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:0 0 42px;
  font-size:13px;
  font-weight:700;
}
.message-row.user .avatar{
  order:2;
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
}
.message-row.assistant .avatar{
  color:#fff;
  background:linear-gradient(135deg,#6f8e7b,#89a898);
}
.bubble-wrap{max-width:min(760px,82%)}
.bubble-meta{
  margin-bottom:7px;
  font-size:12px;
  color:var(--muted);
}
.bubble{
  padding:15px 18px;
  border-radius:24px;
  border:1px solid rgba(0,0,0,.04);
  line-height:1.85;
  font-size:15px;
  white-space:pre-wrap;
  word-break:break-word;
  box-shadow:0 10px 24px rgba(63,42,24,.04);
}
.message-row.user .bubble{
  background:linear-gradient(135deg, #efe0cf, #e6d1ba);
}
.message-row.assistant .bubble{
  background:linear-gradient(135deg, #f7f1e9, #efe7dd);
}
.typing{
  display:inline-flex;
  gap:6px;
  align-items:center;
  height:20px;
}
.typing span{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#8c8174;
  opacity:.35;
  animation:pulse 1s infinite ease-in-out;
}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
.composer{
  padding:16px 18px 18px;
  border-radius:30px;
}
.composer-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  min-height:20px;
  margin-bottom:12px;
}
.composer-head span{
  font-size:13px;
  color:var(--muted);
}
.composer-box{
  display:flex;
  align-items:flex-end;
  gap:12px;
}
.composer textarea{
  flex:1;
  min-height:56px;
  max-height:180px;
  resize:none;
  padding:14px 16px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--glass-strong);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.54);
  color:var(--text);
  font-size:15px;
  line-height:1.75;
  outline:none;
}
.composer textarea::placeholder{color:#9b8f80}
.send{
  border:0;
  border-radius:20px;
  min-width:114px;
  padding:15px 18px;
  color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 18px 34px rgba(143,88,53,.22);
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}
.send:disabled{opacity:.6;cursor:not-allowed;box-shadow:none}
.hint{
  min-height:20px;
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
}
.hint.error{color:var(--warn)}
.hint.success{color:var(--good)}
@keyframes pulse{
  0%,100%{transform:translateY(0);opacity:.28}
  50%{transform:translateY(-4px);opacity:1}
}
@keyframes haloA{
  0%{transform:translate3d(0,0,0) scale(1)}
  100%{transform:translate3d(22px,14px,0) scale(1.05)}
}
@keyframes haloB{
  0%{transform:translate3d(0,0,0) scale(1)}
  100%{transform:translate3d(-18px,-12px,0) scale(1.06)}
}
@keyframes drift{
  0%{transform:translate3d(0,0,0) scale(1)}
  50%{transform:translate3d(18px,-14px,0) scale(1.06)}
  100%{transform:translate3d(-12px,18px,0) scale(.97)}
}
@media (max-width:1120px){
  .cards{grid-template-columns:1fr}
}
@media (max-width:920px){
  body{overflow:auto}
  .layout{
    grid-template-columns:1fr;
    height:auto;
    min-height:100vh;
    padding:14px;
  }
  .sidebar{
    min-height:auto;
  }
  .conversation-list{max-height:220px}
  .topbar{
    flex-direction:column;
    align-items:flex-start;
  }
  .filters{width:100%}
  .topbar-actions{width:100%}
  .field,.select-shell{width:100%}
  .topbar-actions .button{width:100%}
  .composer-box{flex-direction:column}
  .send{width:100%}
  .bubble-wrap{max-width:100%}
  .conversation-delete{
    opacity:1;
    transform:none;
  }
}
</style>
</head>
<body>
<div class="ambient" aria-hidden="true">
  <span></span>
  <span></span>
  <span></span>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <h1>角色对话</h1>
      <p>选择人物，切换模式，用更自然的节奏展开连续交流。</p>
    </div>

    <div class="user-card">
      <strong id="userName">-</strong>
      <span>你已登录，可以继续已有会话，也可以开始新的聊天。</span>
    </div>

    <div class="actions">
      <button class="button primary" id="newConversationBtn">新建会话</button>
      <button class="button ghost" id="clearConversationBtn">清空当前会话</button>
      <button class="button ghost" id="adminBtn" style="display:none">管理员页面</button>
      <button class="button warn" id="logoutBtn">退出登录</button>
    </div>

    <div class="conversation-list" id="conversationList"></div>
  </aside>

  <main class="main">
    <section class="topbar">
      <div class="headline">
        <h2 id="chatTitle">开始新的角色对话</h2>
        <p id="subTitle">选好角色和模式后，就可以直接发消息。</p>
      </div>
      <div class="filters">
        <div class="field">
          <label for="characterSelect">角色</label>
          <div class="select-shell">
            <select class="native-select" id="characterSelect">
              <option value="">请选择角色</option>
            </select>

              <span class="select-value" id="characterSelectLabel">请选择角色</span>
            </button>

              <option value="online">在线模式</option>

              <span class="select-value" id="modeSelectLabel">离线模式</span>
            </button>
            <div class="select-menu" id="modeSelectMenu" role="listbox" aria-labelledby="modeSelectTrigger"></div>

        <button class="send" id="sendBtn" disabled>发送</button>

    </section>
  </main>
</div>

<script>
function resolveApiBase() {
  const { protocol, hostname, port } = window.location;
  if (protocol === 'file:') return 'http://127.0.0.1:8000';
  if (port === '8000') return '';
  if (hostname === 'localhost' || hostname === '127.0.0.1') return `${protocol}//${hostname}:8000`;
  return '';
}

const API_BASE = resolveApiBase();
const authToken = localStorage.getItem('authToken') || '';
const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
if (!authToken || !currentUser) {
  window.location.replace('/login');
}

const $ = id => document.getElementById(id);
const conversationsKey = `rag_conversations_${currentUser.id}`;
const activeConversationKey = `rag_active_conversation_${currentUser.id}`;
const charactersKey = `rag_characters_${currentUser.id}`;

let characters = JSON.parse(localStorage.getItem(charactersKey) || '[]');
let conversations = JSON.parse(localStorage.getItem(conversationsKey) || '[]');
let activeConversationId = localStorage.getItem(activeConversationKey) || '';
const pendingJobs = new Map();
const streamingRenderState = new Map();
const customSelects = {
  characterSelect: {
    trigger: $('characterSelectTrigger'),
    label: $('characterSelectLabel'),
    menu: $('characterSelectMenu'),
    placeholder: '\u8bf7\u9009\u62e9\u89d2\u8272',
    searchable: true,
    searchPlaceholder: '\u641c\u7d22\u89d2\u8272',
    emptyText: '\u6ca1\u6709\u5339\u914d\u7684\u89d2\u8272',
    searchTerm: '',
    isComposing: false,
  },
  modeSelect: {
    trigger: $('modeSelectTrigger'),
    label: $('modeSelectLabel'),
    menu: $('modeSelectMenu'),
    placeholder: '\u8bf7\u9009\u62e9\u6a21\u5f0f',
  },
};

function getLatestCurrentUser() {
  return JSON.parse(localStorage.getItem('currentUser') || 'null') || currentUser;
}

function getConversationById(conversationId) {
  return conversations.find(item => item.id === conversationId) || null;
}

function getConversationJob(conversationId) {
  return pendingJobs.get(conversationId) || null;
}

function isConversationPending(conversationId) {
  return pendingJobs.has(conversationId);
}

function isActiveConversationPending() {
  const conversation = getActiveConversation();
  return conversation ? isConversationPending(conversation.id) : false;
}

function clearConversationJob(conversationId, options = {}) {
  const shouldAbort = options.abort !== false;
  const job = pendingJobs.get(conversationId);
  if (job?.timerId) {
    window.clearInterval(job.timerId);
  }
  const streamState = streamingRenderState.get(conversationId);
  if (streamState?.frameId) {
    window.cancelAnimationFrame(streamState.frameId);
  }
  streamingRenderState.delete(conversationId);
  if (shouldAbort && job?.controller) {
    job.controller.abort();
  }
  pendingJobs.delete(conversationId);
}

function getDisplayName(user) {
  if (!user) return '-';
  return user.username || user.email || '-';
}

function getSecondaryIdentity(user) {
  if (!user) return '-';
  return user.email || user.username || '-';
}

function getUserInitial(user) {
  const displayName = getDisplayName(user).replace(/\s+/g, '');
  return (displayName || '\u6211').slice(0, 2);
}

function authorizedHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${authToken}`,
  };
}

async function apiGet(path) {
  let response;
  try {
    response = await fetch(API_BASE + path, { headers: { 'Authorization': `Bearer ${authToken}` } });
  } catch (error) {
    throw new Error(`\u65e0\u6cd5\u8fde\u63a5\u5230\u670d\u52a1 ${API_BASE || window.location.origin}`);
  }

  const contentType = response.headers.get('content-type') || '';
  const payload = contentType.includes('application/json')
    ? await response.json()
    : { message: `HTTP ${response.status}` };

  if (!response.ok) {
    throw new Error(payload.detail || payload.message || `HTTP ${response.status}`);
  }
  return payload;
}

async function apiPost(path, body) {
  let response;
  try {
    response = await fetch(API_BASE + path, {
      method: 'POST',
      headers: authorizedHeaders(),
      body: JSON.stringify(body),
    });
  } catch (error) {
    throw new Error(`\u65e0\u6cd5\u8fde\u63a5\u5230\u670d\u52a1 ${API_BASE || window.location.origin}`);
  }

  const contentType = response.headers.get('content-type') || '';
  const payload = contentType.includes('application/json')
    ? await response.json()
    : { message: `HTTP ${response.status}` };

  if (!response.ok) {
    throw new Error(payload.detail || payload.message || `HTTP ${response.status}`);
  }
  return payload;
}

async function apiPostSSE(path, body, handlers = {}, options = {}) {
  let response;
  try {
    response = await fetch(API_BASE + path, {
      method: 'POST',
      headers: authorizedHeaders(),
      body: JSON.stringify(body),
      signal: options.signal,
    });
  } catch (error) {
    if (error.name === 'AbortError') {
      throw error;
    }
    throw new Error(`\u65e0\u6cd5\u8fde\u63a5\u5230\u670d\u52a1 ${API_BASE || window.location.origin}`);
  }

  if (!response.ok) {
    const contentType = response.headers.get('content-type') || '';
    const payload = contentType.includes('application/json')
      ? await response.json()
      : { message: `HTTP ${response.status}` };
    throw new Error(payload.detail || payload.message || `HTTP ${response.status}`);
  }

  if (!response.body) {
    throw new Error('\u6d41\u5f0f\u54cd\u5e94\u4e0d\u53ef\u7528');
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder('utf-8');
  let buffer = '';

  const processBlock = block => {
    const lines = block.split(/\r?\n/);
    let event = 'message';
    const dataLines = [];

    lines.forEach(line => {
      if (!line || line.startsWith(':')) return;
      if (line.startsWith('event:')) {
        event = line.slice(6).trim() || 'message';
        return;
      }
      if (line.startsWith('data:')) {
        dataLines.push(line.slice(5).trim());
      }
    });

    if (!dataLines.length) {
      return;
    }

    let payload;
    try {
      payload = JSON.parse(dataLines.join('\n'));
    } catch (error) {
      payload = { message: dataLines.join('\n') };
    }

    const handler = handlers[event] || handlers.message;
    if (handler) {
      handler(payload);
    }
  };

  while (true) {
    const { value, done } = await reader.read();
    buffer += decoder.decode(value || new Uint8Array(), { stream: !done }).replace(/\r\n/g, '\n');

    let separatorIndex = buffer.indexOf('\n\n');
    while (separatorIndex !== -1) {
      const block = buffer.slice(0, separatorIndex).trim();
      buffer = buffer.slice(separatorIndex + 2);
      if (block) {
        processBlock(block);
      }
      separatorIndex = buffer.indexOf('\n\n');
    }

    if (done) {
      const tail = buffer.trim();
      if (tail) {
        processBlock(tail);
      }
      break;
    }
  }
}

function buildSessionId(conversation) {
  return conversation.sessionId || `${currentUser.id}_${conversation.id}`;
}

function extractConversationId(sessionId) {
  const prefix = `${currentUser.id}_`;
  if (sessionId && sessionId.startsWith(prefix)) {
    return sessionId.slice(prefix.length);
  }
  return sessionId || `sess_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
}

async function loadCurrentUserProfile() {
  const profile = await apiGet('/api/me');
  localStorage.setItem('currentUser', JSON.stringify(profile));
  $('userName').textContent = getDisplayName(profile);
  document.querySelector('.user-card span').textContent = getSecondaryIdentity(profile);
  $('adminBtn').style.display = profile.is_admin ? 'block' : 'none';
  return profile;
}

function saveConversations() {
  localStorage.setItem(conversationsKey, JSON.stringify(conversations));
  localStorage.setItem(activeConversationKey, activeConversationId);
}

function normalizePersistedConversation(item) {
  const sessionId = item.session_id || '';
  const rawMessages = Array.isArray(item.messages) ? item.messages : [];
  const messages = rawMessages.flatMap(message => {
    const turns = [];
    if (message.user_message) {
      turns.push({ role: 'user', content: message.user_message });
    }
    if (message.assistant_message) {
      turns.push({ role: 'assistant', content: message.assistant_message });
    }
    return turns;
  });
  return {
    id: extractConversationId(sessionId),
    sessionId,
    title: item.title || '',
    characterName: item.character_name || '',
    chatMode: item.chat_mode || 'offline',
    messages,
    sources: Array.isArray(item.sources) ? item.sources : [],
    createdAt: item.created_at ? Date.parse(item.created_at) || Date.now() : Date.now(),
  };
}

async function loadPersistedConversations() {
  const payload = await apiGet('/api/rag/sessions');
  if (!Array.isArray(payload)) {
    return;
  }

  const serverConversations = payload
    .map(normalizePersistedConversation)
    .filter(item => item.sessionId);

  if (serverConversations.length === 0) {
    return;
  }

  const merged = [...serverConversations];
  const seenSessionIds = new Set(serverConversations.map(item => item.sessionId));
  conversations.forEach(item => {
    if (item.sessionId && seenSessionIds.has(item.sessionId)) {
      return;
    }
    merged.push(item);
  });

  conversations = merged;
  const activeExists = conversations.some(item => item.id === activeConversationId);
  activeConversationId = activeExists ? activeConversationId : conversations[0].id;
  saveConversations();
}

function setHint(text = '', type = '') {
  const node = $('hint');
  node.textContent = text;
  node.className = type ? `hint ${type}` : 'hint';
}

function getCharacterByName(name) {
  return characters.find(item => item.name === name) || null;
}

function getActiveConversation() {
  return conversations.find(item => item.id === activeConversationId) || null;
}

function deleteConversationLocal(conversationId) {
  const currentIndex = conversations.findIndex(item => item.id === conversationId);
  if (currentIndex === -1) return null;

  clearConversationJob(conversationId);
  conversations.splice(currentIndex, 1);
  if (activeConversationId === conversationId) {
    activeConversationId = conversations[0]?.id || '';
  }

  if (!conversations.length) {
    return createConversation('', $('modeSelect').value || 'offline');
  }

  saveConversations();
  return getActiveConversation();
}

function createConversationFromSelection(hintText = '') {
  const selectedCharacter = $('characterSelect').value || '';
  const selectedMode = $('modeSelect').value || 'offline';
  const conversation = createConversation(selectedCharacter, selectedMode);
  if (hintText) {
    setHint(hintText, 'success');
  }
  return conversation;
}

function getModeLabel(mode) {
  return mode === 'online' ? '\u5728\u7ebf\u6a21\u5f0f' : '\u79bb\u7ebf\u6a21\u5f0f';
}

function closeAllCustomSelects(exceptId = '') {
  Object.entries(customSelects).forEach(([selectId, config]) => {
    if (selectId === exceptId) return;
    const shell = config.trigger.closest('.select-shell');
    shell.classList.remove('open');
    config.trigger.setAttribute('aria-expanded', 'false');
    if (config.searchable) {
      config.isComposing = false;
    }
    if (config.searchable && config.searchTerm) {
      config.searchTerm = '';
      syncCustomSelect(selectId);
    }
  });
}

function getFilteredSelectOptions(selectId) {
  const select = $(selectId);
  const config = customSelects[selectId];
  if (!select || !config) return [];

  const query = (config.searchTerm || '').trim().toLowerCase();
  return Array.from(select.options).filter(option => {
    if (!query) return true;
    if (option.value === '') return false;
    return option.textContent.toLowerCase().includes(query);
  });
}

function syncCustomSelect(selectId) {
  const select = $(selectId);
  const config = customSelects[selectId];
  if (!select || !config) return;

  const selectedOption = select.options[select.selectedIndex];
  const selectedText = selectedOption ? selectedOption.textContent : config.placeholder;
  config.label.textContent = selectedText || config.placeholder;
  config.trigger.disabled = select.disabled;

  config.menu.innerHTML = '';
  let optionsRoot = config.menu;
  if (config.searchable) {
    const searchWrap = document.createElement('div');
    searchWrap.className = 'select-search';

    const searchInput = document.createElement('input');
    searchInput.type = 'text';
    searchInput.className = 'select-search-input';
    searchInput.placeholder = config.searchPlaceholder || '';
    searchInput.value = config.searchTerm || '';
    searchInput.autocomplete = 'off';
    searchInput.spellcheck = false;
    searchInput.addEventListener('click', event => {
      event.stopPropagation();
    });
    searchInput.addEventListener('keydown', event => {
      event.stopPropagation();
      if (event.key === 'Escape') {
        closeAllCustomSelects();
      }
    });
    searchInput.addEventListener('compositionstart', () => {
      config.isComposing = true;
    });
    searchInput.addEventListener('compositionend', event => {
      config.isComposing = false;
      config.searchTerm = event.target.value || '';
      syncCustomSelect(selectId);
      const nextInput = config.menu.querySelector('.select-search-input');
      if (nextInput) nextInput.focus();
    });
    searchInput.addEventListener('input', event => {
      config.searchTerm = event.target.value || '';
      if (config.isComposing) return;
      syncCustomSelect(selectId);
      const nextInput = config.menu.querySelector('.select-search-input');
      if (nextInput) {
        nextInput.focus();
        const nextLength = nextInput.value.length;
        nextInput.setSelectionRange(nextLength, nextLength);
      }
    });
    searchWrap.appendChild(searchInput);
    config.menu.appendChild(searchWrap);

    optionsRoot = document.createElement('div');
    optionsRoot.className = 'select-options';
    config.menu.appendChild(optionsRoot);
  }

  const filteredOptions = getFilteredSelectOptions(selectId);
  filteredOptions.forEach(option => {
    const item = document.createElement('button');
    item.type = 'button';
    item.className = `select-option${option.value === '' ? ' placeholder' : ''}${option.value === select.value ? ' active' : ''}`;
    item.textContent = option.textContent;
    item.setAttribute('role', 'option');
    item.setAttribute('aria-selected', String(option.value === select.value));
    item.addEventListener('click', event => {
      event.stopPropagation();
      if (select.disabled) return;
      closeAllCustomSelects();
      if (select.value === option.value) return;
      select.value = option.value;
      syncCustomSelect(selectId);
      select.dispatchEvent(new Event('change', { bubbles: true }));
    });
    optionsRoot.appendChild(item);
  });

  if (!filteredOptions.length) {
    const empty = document.createElement('div');
    empty.className = 'select-empty';
    empty.textContent = config.emptyText || '';
    optionsRoot.appendChild(empty);
  }
}

function bindCustomSelect(selectId) {
  const select = $(selectId);
  const config = customSelects[selectId];
  if (!select || !config) return;

  config.trigger.addEventListener('click', event => {
    event.stopPropagation();
    if (select.disabled) return;
    const shell = config.trigger.closest('.select-shell');
    const isOpen = shell.classList.contains('open');
    closeAllCustomSelects(isOpen ? '' : selectId);
    if (!isOpen && config.searchable) {
      config.searchTerm = '';
      syncCustomSelect(selectId);
    }
    shell.classList.toggle('open', !isOpen);
    config.trigger.setAttribute('aria-expanded', String(!isOpen));
    if (!isOpen && config.searchable) {
      requestAnimationFrame(() => {
        const searchInput = config.menu.querySelector('.select-search-input');
        if (searchInput) searchInput.focus();
      });
    }
  });

  config.menu.addEventListener('click', event => {
    event.stopPropagation();
  });

  select.addEventListener('change', () => {
    syncCustomSelect(selectId);
  });

  syncCustomSelect(selectId);
}

function getSendingHint(mode) {
  return mode === 'online'
    ? '\u6b63\u5728\u8fde\u63a5\u5728\u7ebf\u6a21\u578b\uff0c\u8bf7\u7a0d\u5019...'
    : '\u6b63\u5728\u8fde\u63a5\u672c\u5730\u6a21\u578b\uff0c\u8bf7\u7a0d\u5019...';
}

function makeConversation(characterName = '', chatMode = 'offline') {
  const now = Date.now();
  return {
    id: `sess_${now}_${Math.random().toString(36).slice(2, 8)}`,
    title: characterName ? `${characterName} \u00b7 ${getModeLabel(chatMode)}` : `\u65b0\u4f1a\u8bdd \u00b7 ${getModeLabel(chatMode)}`,
    characterName,
    chatMode,
    messages: [],
    createdAt: now,
  };
}

function ensureStreamingAssistantMessage(conversationId) {
  const conversation = getConversationById(conversationId);
  if (!conversation) return null;

  const job = getConversationJob(conversationId) || {};
  if (Number.isInteger(job.messageIndex) && conversation.messages[job.messageIndex]) {
    return conversation.messages[job.messageIndex];
  }

  const assistantMessage = { role: 'assistant', content: '' };
  conversation.messages.push(assistantMessage);
  pendingJobs.set(conversationId, {
    ...job,
    phase: 'stream',
    messageIndex: conversation.messages.length - 1,
  });
  return assistantMessage;
}

function animateConversationResponse(conversationId, responseText) {
  const conversation = getConversationById(conversationId);
  if (!conversation) {
    clearConversationJob(conversationId);
    return;
  }

  const assistantMessage = { role: 'assistant', content: '' };
  conversation.messages.push(assistantMessage);
  saveConversations();

  let index = 0;
  const timerId = window.setInterval(() => {
    const currentConversation = getConversationById(conversationId);
    if (!currentConversation) {
      clearConversationJob(conversationId);
      return;
    }

    const targetMessage = currentConversation.messages[currentConversation.messages.length - 1];
    if (!targetMessage || targetMessage.role !== 'assistant') {
      clearConversationJob(conversationId);
      return;
    }

    index += 1;
    targetMessage.content = responseText.slice(0, index);

    if (activeConversationId === conversationId) {
      renderMessages();
    }

    if (index >= responseText.length) {
      clearConversationJob(conversationId);
      saveConversations();
      if (activeConversationId === conversationId) {
        renderAll();
      } else {
        renderConversationList();
      }
    }
  }, 16);

  pendingJobs.set(conversationId, { phase: 'render', timerId });
  if (activeConversationId === conversationId) {
    renderAll();
  } else {
    renderConversationList();
  }
}

function renderCharacterOptions() {
  const select = $('characterSelect');
  const currentValue = select.value;
  select.innerHTML = '<option value="">\u8bf7\u9009\u62e9\u89d2\u8272</option>';
  characters.forEach(character => {
    const option = document.createElement('option');
    option.value = character.name;
    option.textContent = character.name;
    select.appendChild(option);
  });
  if (currentValue && characters.some(item => item.name === currentValue)) {
    select.value = currentValue;
  }
  syncCustomSelect('characterSelect');
}

function renderConversationList() {
  const root = $('conversationList');
  root.innerHTML = '';
  conversations.forEach(item => {
    const card = document.createElement('div');
    card.className = 'conversation-card';

    const button = document.createElement('button');
    button.type = 'button';
    button.className = `conversation-item${item.id === activeConversationId ? ' active' : ''}`;
    const job = getConversationJob(item.id);
    const title = item.title || (item.characterName ? `${item.characterName} \u00b7 ${getModeLabel(item.chatMode || 'offline')}` : '\u65b0\u4f1a\u8bdd');
    const baseSubtitle = item.characterName
      ? `${item.characterName} \u00b7 ${getModeLabel(item.chatMode || 'offline')}`
      : getModeLabel(item.chatMode || 'offline');
    const subtitle = job
      ? `${baseSubtitle} \u00b7 ${job.phase === 'request' ? '\u6b63\u5728\u751f\u6210' : '\u6b63\u5728\u8f93\u51fa'}`
      : baseSubtitle;
    button.innerHTML = `<strong>${title}</strong><span>${subtitle}</span>`;
    button.addEventListener('click', () => {
      activeConversationId = item.id;
      $('characterSelect').value = item.characterName || '';
      $('modeSelect').value = item.chatMode || 'offline';
      saveConversations();
      renderAll();
    });
    card.appendChild(button);

    const deleteButton = document.createElement('button');
    deleteButton.type = 'button';
    deleteButton.className = 'conversation-delete';
    deleteButton.textContent = 'x';
    deleteButton.title = '\u5220\u9664\u4f1a\u8bdd';
    deleteButton.setAttribute('aria-label', `\u5220\u9664\u4f1a\u8bdd ${title}`);
    deleteButton.addEventListener('click', async event => {
      event.stopPropagation();
      if (!window.confirm(`\u786e\u8ba4\u5220\u9664\u4f1a\u8bdd "${title}" \u5417\uff1f\u8be5\u4f1a\u8bdd\u7684\u672c\u5730\u8bb0\u5f55\u548c\u8bb0\u5fc6\u6570\u636e\u90fd\u4f1a\u88ab\u5220\u9664\u3002`)) {
        return;
      }

      try {
        await apiPost('/api/rag/session/delete', {
          session_id: buildSessionId(item),
        });
        deleteConversationLocal(item.id);
        const current = getActiveConversation();
        $('characterSelect').value = current?.characterName || '';
        $('modeSelect').value = current?.chatMode || 'offline';
        renderAll();
        setHint('\u4f1a\u8bdd\u5df2\u5220\u9664\u3002', 'success');
      } catch (error) {
        setHint(error.message || '\u5220\u9664\u4f1a\u8bdd\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5', 'error');
      }
    });
    card.appendChild(deleteButton);
    root.appendChild(card);
  });
}

function renderMeta() {
  const latestUser = getLatestCurrentUser();
  $('userName').textContent = getDisplayName(latestUser);
  document.querySelector('.user-card span').textContent = getSecondaryIdentity(latestUser);
  const conversation = getActiveConversation();
  const selectedName = conversation?.characterName || $('characterSelect').value || '';
  const selectedMode = conversation?.chatMode || $('modeSelect').value || 'offline';
  const character = getCharacterByName(selectedName);

  $('chatTitle').textContent = selectedName ? `\u4e0e ${selectedName} \u5bf9\u8bdd\u4e2d` : '\u5f00\u59cb\u65b0\u7684\u89d2\u8272\u5bf9\u8bdd';
  $('subTitle').textContent = selectedName
    ? `${getModeLabel(selectedMode)} \u00b7 \u4fdd\u6301\u5f53\u524d\u89d2\u8272\u8bed\u6c14\u6301\u7eed\u4ea4\u6d41`
    : '\u9009\u597d\u89d2\u8272\u548c\u6a21\u5f0f\u540e\uff0c\u5c31\u53ef\u4ee5\u76f4\u63a5\u53d1\u6d88\u606f\u3002';
  const topSource = conversation && Array.isArray(conversation.sources) ? conversation.sources[0] : null;
  $('characterProfile').textContent = topSource
    ? `[${Number(topSource.rerank_score || 0).toFixed(4)}] ${topSource.text || topSource.name || ''}`
    : '当前还没有可展示的重排结果。';
  $('turnCount').textContent = conversation ? String(conversation.messages.filter(item => item.role === 'assistant').length) : '0';
  $('messageCount').textContent = conversation ? String(conversation.messages.length) : '0';
  $('modeHint').textContent = `\u5f53\u524d\uff1a${getModeLabel(selectedMode)}`;
  $('composerStatus').textContent = conversation && conversation.characterName
    ? `${conversation.characterName} \u00b7 ${getModeLabel(selectedMode)}`
    : '\u8bf7\u9009\u62e9\u89d2\u8272\u548c\u6a21\u5f0f\u540e\u5f00\u59cb\u804a\u5929\u3002';
}

function appendMessage(root, role, content, characterName = '', isTyping = false) {
  const row = document.createElement('div');
  row.className = `message-row ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user'
    ? getUserInitial(getLatestCurrentUser())
    : (characterName || '\u89d2\u8272').slice(0, 2);

  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap';
  wrap.innerHTML = `
    <div class="bubble-meta">${role === 'user' ? getDisplayName(getLatestCurrentUser()) : (characterName || '\u89d2\u8272\u56de\u590d')}</div>
    <div class="bubble"></div>
  `;

  const bubble = wrap.querySelector('.bubble');
  if (isTyping) {
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  } else {
    bubble.textContent = content;
  }

  row.appendChild(avatar);
  row.appendChild(wrap);
  root.appendChild(row);
  return bubble;
}

function renderMessages() {
  const root = $('messages');
  root.innerHTML = '';
  const conversation = getActiveConversation();
  if (!conversation || conversation.messages.length === 0) {
    root.innerHTML = '<div class="empty">\u6311\u4e00\u4e2a\u89d2\u8272\uff0c\u9009\u597d\u6a21\u5f0f\uff0c\u5f00\u59cb\u4f60\u7684\u7b2c\u4e00\u53e5\u5bf9\u8bdd\u5427\u3002</div>';
    return;
  }
  conversation.messages.forEach(message => {
    appendMessage(root, message.role, message.content, conversation.characterName);
  });
  const job = getConversationJob(conversation.id);
  if (job?.phase === 'request') {
    appendMessage(root, 'assistant', '', conversation.characterName, true);
  }
  root.scrollTop = root.scrollHeight;
}

function getStreamingBubble(conversationId) {
  const state = streamingRenderState.get(conversationId) || {};
  if (state.bubble && document.body.contains(state.bubble)) {
    return state.bubble;
  }

  if (activeConversationId !== conversationId) {
    return null;
  }

  const conversation = getConversationById(conversationId);
  if (!conversation) {
    return null;
  }

  const job = getConversationJob(conversationId);
  let bubble = null;
  const messageRows = $('messages').querySelectorAll('.message-row.assistant');
  if (messageRows.length) {
    bubble = messageRows[messageRows.length - 1].querySelector('.bubble');
  }

  if (!bubble || job?.phase === 'request') {
    renderMessages();
    const renderedRows = $('messages').querySelectorAll('.message-row.assistant');
    if (renderedRows.length) {
      bubble = renderedRows[renderedRows.length - 1].querySelector('.bubble');
    }
  }

  if (bubble) {
    streamingRenderState.set(conversationId, { ...state, bubble });
  }
  return bubble;
}

function scheduleStreamingBubbleUpdate(conversationId, content) {
  if (activeConversationId !== conversationId) {
    renderConversationList();
    return;
  }

  const state = streamingRenderState.get(conversationId) || {};
  state.pendingContent = content;
  streamingRenderState.set(conversationId, state);

  if (state.frameId) {
    return;
  }

  state.frameId = window.requestAnimationFrame(() => {
    const currentState = streamingRenderState.get(conversationId);
    if (!currentState) {
      return;
    }
    currentState.frameId = null;
    const bubble = getStreamingBubble(conversationId);
    if (!bubble) {
      return;
    }
    bubble.textContent = currentState.pendingContent || '';
    $('messages').scrollTop = $('messages').scrollHeight;
  });
}

function updateComposerState() {
  const conversation = getActiveConversation();
  const hasCharacter = Boolean(conversation?.characterName || $('characterSelect').value);
  const activePending = isActiveConversationPending();
  $('sendBtn').disabled = activePending || !hasCharacter || !$('messageInput').value.trim();
  $('sendBtn').textContent = activePending ? '\u751f\u6210\u4e2d...' : '\u53d1\u9001';
  $('characterSelect').disabled = false;
  $('modeSelect').disabled = false;
  $('newConversationBtn').disabled = false;
  $('startRoleConversationBtn').disabled = !$('characterSelect').value;
  $('clearConversationBtn').disabled = activePending;
  syncCustomSelect('characterSelect');
  syncCustomSelect('modeSelect');
}

function renderAll() {
  renderConversationList();
  renderMeta();
  renderMessages();
  updateComposerState();
}

function createConversation(characterName, chatMode) {
  const conversation = makeConversation(characterName, chatMode);
  conversations.unshift(conversation);
  activeConversationId = conversation.id;
  $('characterSelect').value = characterName || '';
  $('modeSelect').value = chatMode || 'offline';
  saveConversations();
  renderAll();
  return conversation;
}

function ensureConversation(characterName, chatMode) {
  const current = getActiveConversation();
  if (!current) return createConversation(characterName, chatMode);
  if (!current.messages.length) {
    current.characterName = characterName;
    current.chatMode = chatMode;
    current.title = characterName ? `${characterName} \u00b7 ${getModeLabel(chatMode)}` : '\u65b0\u4f1a\u8bdd';
    saveConversations();
    return current;
  }
  if (current.characterName !== characterName || (current.chatMode || 'offline') !== chatMode) {
    return createConversation(characterName, chatMode);
  }
  return current;
}

async function loadCharacters() {
  const payload = await apiGet('/api/characters');
  characters = payload;
  localStorage.setItem(charactersKey, JSON.stringify(characters));
  renderCharacterOptions();
}

function typewriterEffect(target, text, done) {
  let index = 0;
  target.textContent = '';
  const timer = setInterval(() => {
    index += 1;
    target.textContent = text.slice(0, index);
    $('messages').scrollTop = $('messages').scrollHeight;
    if (index >= text.length) {
      clearInterval(timer);
      if (done) done();
    }
  }, 16);
}

async function sendMessage() {
  const text = $('messageInput').value.trim();
  if (!text) return;

  const selectedCharacter = $('characterSelect').value;
  const selectedMode = $('modeSelect').value || 'offline';
  if (!selectedCharacter) {
    setHint('\u8bf7\u5148\u9009\u62e9\u89d2\u8272\u3002', 'error');
    return;
  }

  const conversation = ensureConversation(selectedCharacter, selectedMode);
  if (isConversationPending(conversation.id)) {
    return;
  }
  if (conversation.messages.length === 0) {
    conversation.title = `${selectedCharacter} \u00b7 ${text.slice(0, 16)}${text.length > 16 ? '...' : ''}`;
  }
  conversation.sessionId = buildSessionId(conversation);

  conversation.messages.push({ role: 'user', content: text });
  $('messageInput').value = '';
  $('messageInput').style.height = '56px';
  const controller = new AbortController();
  pendingJobs.set(conversation.id, { phase: 'request', controller });
  setHint(getSendingHint(selectedMode));
  renderAll();

  try {
    await apiPostSSE('/api/rag/chat/stream', {
      query: text,
      session_id: conversation.sessionId,
      character_name: conversation.characterName,
      chat_mode: conversation.chatMode || 'offline',
      conversation_title: conversation.title || '',
    }, {
      delta(payload) {
        const currentConversation = getConversationById(conversation.id);
        if (!currentConversation) {
          clearConversationJob(conversation.id);
          return;
        }
        const assistantMessage = ensureStreamingAssistantMessage(conversation.id);
        if (!assistantMessage) {
          clearConversationJob(conversation.id);
          return;
        }
        assistantMessage.content += payload.content || '';
        if (activeConversationId === conversation.id) {
          scheduleStreamingBubbleUpdate(conversation.id, assistantMessage.content);
        }
      },
      replace(payload) {
        const currentConversation = getConversationById(conversation.id);
        if (!currentConversation) {
          clearConversationJob(conversation.id);
          return;
        }
        const assistantMessage = ensureStreamingAssistantMessage(conversation.id);
        if (!assistantMessage) {
          clearConversationJob(conversation.id);
          return;
        }
        assistantMessage.content = payload.content || '';
        if (activeConversationId === conversation.id) {
          scheduleStreamingBubbleUpdate(conversation.id, assistantMessage.content);
        }
      },
      done(payload) {
        const currentConversation = getConversationById(conversation.id);
        if (!currentConversation) {
          clearConversationJob(conversation.id);
          return;
        }
        const assistantMessage = ensureStreamingAssistantMessage(conversation.id);
        if (assistantMessage) {
          assistantMessage.content = payload.response || assistantMessage.content || '\uff08\u65e0\u54cd\u5e94\uff09';
        }
        currentConversation.sources = Array.isArray(payload.sources) ? payload.sources : [];
        currentConversation.sessionId = payload.session_id || currentConversation.sessionId;
        clearConversationJob(conversation.id, { abort: false });
        saveConversations();
        if (activeConversationId === conversation.id) {
          renderAll();
        } else {
          renderConversationList();
        }
        setHint(`${getModeLabel(conversation.chatMode || 'offline')}\u5df2\u5b8c\u6210\u56de\u590d\u3002`, 'success');
      },
      error(payload) {
        throw new Error(payload.message || '\u6d41\u5f0f\u8bf7\u6c42\u5931\u8d25');
      },
    }, {
      signal: controller.signal,
    });
  } catch (error) {
    clearConversationJob(conversation.id);
    const currentConversation = getConversationById(conversation.id);
    if (!currentConversation) {
      return;
    }
    const errorText = error.message || '\u8bf7\u6c42\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5';
    const assistantMessage = ensureStreamingAssistantMessage(conversation.id);
    if (assistantMessage) {
      assistantMessage.content = errorText;
    } else {
      currentConversation.messages.push({ role: 'assistant', content: errorText });
    }
    saveConversations();
    setHint(errorText, 'error');
  } finally {
    renderConversationList();
    renderMeta();
    updateComposerState();
    if (activeConversationId === conversation.id) {
      $('messages').scrollTop = $('messages').scrollHeight;
    }
  }
}

$('characterSelect').addEventListener('change', () => {
  const selectedCharacter = $('characterSelect').value;
  const selectedMode = $('modeSelect').value || 'offline';
  const current = getActiveConversation();
  if (!current) {
    renderMeta();
    updateComposerState();
    return;
  }

  if (!current.messages.length) {
    current.characterName = selectedCharacter;
    current.chatMode = selectedMode;
    current.title = selectedCharacter ? `${selectedCharacter} \u00b7 ${getModeLabel(selectedMode)}` : '\u65b0\u4f1a\u8bdd';
    saveConversations();
    renderAll();
    return;
  }

  if (!selectedCharacter) {
    renderAll();
    return;
  }

  createConversation(selectedCharacter, selectedMode);
  setHint(`\u5df2\u5207\u6362\u5230 ${selectedCharacter} \u7684\u65b0\u4f1a\u8bdd\u3002`, 'success');
});

$('modeSelect').addEventListener('change', () => {
  const selectedMode = $('modeSelect').value || 'offline';
  const selectedCharacter = $('characterSelect').value || '';
  const current = getActiveConversation();
  if (!current) {
    renderMeta();
    updateComposerState();
    return;
  }

  if (!current.messages.length) {
    current.chatMode = selectedMode;
    current.title = current.characterName
      ? `${current.characterName} \u00b7 ${getModeLabel(selectedMode)}`
      : `\u65b0\u4f1a\u8bdd \u00b7 ${getModeLabel(selectedMode)}`;
    saveConversations();
    renderAll();
    return;
  }

  if ((current.chatMode || 'offline') !== selectedMode) {
    createConversation(selectedCharacter, selectedMode);
    setHint('\u5df2\u6309\u65b0\u6a21\u5f0f\u521b\u5efa\u72ec\u7acb\u4f1a\u8bdd\u3002', 'success');
  } else {
    renderAll();
  }
});

$('newConversationBtn').addEventListener('click', () => {
  createConversation($('characterSelect').value || '', $('modeSelect').value || 'offline');
  setHint('\u5df2\u521b\u5efa\u65b0\u4f1a\u8bdd\u3002', 'success');
});

$('startRoleConversationBtn').addEventListener('click', () => {
  const selectedCharacter = $('characterSelect').value;
  if (!selectedCharacter) {
    setHint('\u8bf7\u5148\u9009\u62e9\u89d2\u8272\u3002', 'error');
    return;
  }
  createConversationFromSelection(`\u5df2\u4e3a ${selectedCharacter} \u5f00\u542f\u65b0\u4f1a\u8bdd\u3002`);
});

$('clearConversationBtn').addEventListener('click', async () => {
  const conversation = getActiveConversation();
  if (!conversation) {
    setHint('\u5f53\u524d\u6ca1\u6709\u53ef\u6e05\u7a7a\u7684\u4f1a\u8bdd\u3002', 'error');
    return;
  }

  try {
    await apiPost('/api/rag/clear', {
      session_id: buildSessionId(conversation),
      conversation_title: conversation.characterName
        ? `${conversation.characterName} \u00b7 ${getModeLabel(conversation.chatMode || 'offline')}`
        : `\u65b0\u4f1a\u8bdd \u00b7 ${getModeLabel(conversation.chatMode || 'offline')}`,
      character_name: conversation.characterName || '',
      chat_mode: conversation.chatMode || 'offline',
    });
    conversation.messages = [];
    conversation.title = conversation.characterName
      ? `${conversation.characterName} \u00b7 ${getModeLabel(conversation.chatMode || 'offline')}`
      : '\u65b0\u4f1a\u8bdd';
    saveConversations();
    renderAll();
    setHint('\u5f53\u524d\u4f1a\u8bdd\u5df2\u6e05\u7a7a\u3002', 'success');
  } catch (error) {
    setHint(error.message || '\u6e05\u7a7a\u5931\u8d25\uff0c\u8bf7\u7a0d\u540e\u91cd\u8bd5', 'error');
  }
});

$('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('authToken');
  localStorage.removeItem('currentUser');
  window.location.replace('/login');
});

$('adminBtn').addEventListener('click', () => {
  window.location.replace('/admin');
});

$('sendBtn').addEventListener('click', sendMessage);
$('messageInput').addEventListener('input', event => {
  const target = event.target;
  target.style.height = '56px';
  target.style.height = `${Math.min(target.scrollHeight, 180)}px`;
  updateComposerState();
});

$('messageInput').addEventListener('keydown', event => {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    if (!$('sendBtn').disabled) sendMessage();
  }
});

document.addEventListener('click', () => {
  closeAllCustomSelects();
});

document.addEventListener('keydown', event => {
  if (event.key === 'Escape') closeAllCustomSelects();
});

bindCustomSelect('characterSelect');
bindCustomSelect('modeSelect');

(async function bootstrap() {
  try {
    await loadCurrentUserProfile();
    await loadCharacters();
    await loadPersistedConversations();
    if (!activeConversationId) {
      createConversation('', 'offline');
    } else {
      const current = getActiveConversation();
      if (current?.characterName) $('characterSelect').value = current.characterName;
      if (current?.chatMode) $('modeSelect').value = current.chatMode;
      renderAll();
    }
  } catch (error) {
    setHint(error.message || '\u89d2\u8272\u52a0\u8f7d\u5931\u8d25', 'error');
    renderAll();
  }
})();
</script>
</body>
</html>
