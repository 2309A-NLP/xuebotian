<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=/login">
<title>页面跳转中</title>
<style>
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#f6f1e6,#efe7d6 52%,#f7f3ec);
  color:#1d1b18;
}
.card{
  width:min(420px,calc(100vw - 32px));
  padding:28px 24px;
  border-radius:24px;
  background:rgba(255,255,255,.78);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 18px 44px rgba(61,41,22,.12);
  text-align:center;
}
a{color:#8a4f2a;text-decoration:none;font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <p>页面正在跳转到登录页。</p>
    <p><a href="/login">如果没有自动跳转，点这里继续</a></p>
  </div>
</body>
</html>
