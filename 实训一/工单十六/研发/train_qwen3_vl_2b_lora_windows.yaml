### model
model_name_or_path: G:\eight_dim\model\Qwen3-VL-2B-Instruct
template: qwen3_vl_nothink  # Qwen3-VL 系列专用模板

### method
stage: sft
do_train: true
finetuning_type: lora
lora_target: all  # Qwen3-VL 建议全层 LoRA
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05
use_rslora: true

### dataset
dataset_dir: G:\eight_dim\github_projects\Lora_fine-tuning\LLaMA-Factory\data
dataset: patent_multimodal
cutoff_len: 4096
max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 4

### output
output_dir: G:\eight_dim\github_projects\Lora_fine-tuning\LLaMA-Factory\saves\qwen3-vl-2b-patent-lora
logging_steps: 10
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-4  # 2B 模型可用较大学习率
num_train_epochs: 20.0  # 小模型建议更多 epoch
lr_scheduler_type: cosine
#warmup_ratio: 0.1
warmup_steps: 100
bf16: true
ddp_timeout: 180000000

### eval
val_size: 0.1
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 100

### multimodal
#image_resolution: 512  # Qwen3-VL 支持动态分辨率，512 足够
